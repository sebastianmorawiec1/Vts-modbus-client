"""
Klient Modbus TCP/IP do komunikacji z urządzeniami VTS.

Oparty o bibliotekę `pymodbus` (>=3.6). Pozwala odczytywać i zapisywać
parametry centrali po nazwie zdefiniowanej w mapie rejestrów, zamiast
operować bezpośrednio na surowych adresach.
"""

import logging
from typing import Any, Dict, Optional

from pymodbus.client import ModbusTcpClient
from pymodbus.exceptions import ModbusException

from .config import DeviceConfig
from .exceptions import (
    VTSConnectionError,
    VTSRegisterNotFoundError,
    VTSReadError,
    VTSWriteError,
)
from .registers import RegisterDefinition

logger = logging.getLogger(__name__)


class VTSModbusClient:
    """Klient wysokopoziomowy do komunikacji z centralą VTS po Modbus TCP/IP."""

    def __init__(
        self,
        device_config: DeviceConfig,
        registers: Dict[str, RegisterDefinition],
    ):
        self.device_config = device_config
        self.registers = registers
        self._client: Optional[ModbusTcpClient] = None

    # -- context manager -----------------------------------------------
    def __enter__(self) -> "VTSModbusClient":
        self.connect()
        return self

    def __exit__(self, exc_type, exc_val, exc_tb) -> None:
        self.disconnect()

    # -- połączenie -------------------------------------------------------
    def connect(self) -> None:
        self._client = ModbusTcpClient(
            host=self.device_config.host,
            port=self.device_config.port,
            timeout=self.device_config.timeout,
        )
        ok = self._client.connect()
        if not ok:
            raise VTSConnectionError(
                f"Nie udało się połączyć z {self.device_config.host}:"
                f"{self.device_config.port}"
            )
        logger.info(
            "Połączono z centralą VTS %s:%s (unit_id=%s)",
            self.device_config.host,
            self.device_config.port,
            self.device_config.unit_id,
        )

    def disconnect(self) -> None:
        if self._client is not None:
            self._client.close()
            logger.info("Rozłączono z centralą VTS")

    @property
    def is_connected(self) -> bool:
        return bool(self._client and self._client.is_socket_open())

    # -- odczyt / zapis pojedynczego parametru ---------------------------
    def read(self, name: str):
        reg = self._get_register(name)
        if reg.access == "write":
            raise VTSReadError(f"Rejestr '{name}' jest tylko do zapisu")

        try:
            raw = self._read_raw(reg)
        except ModbusException as exc:
            raise VTSReadError(f"Błąd odczytu rejestru '{name}': {exc}") from exc

        if raw.isError():
            raise VTSReadError(f"Urządzenie zwróciło błąd dla rejestru '{name}': {raw}")

        if reg.table in ("coil", "discrete_input"):
            return raw.bits[0]

        return reg.decode(raw.registers)

    def write(self, name: str, value: Any) -> None:
        reg = self._get_register(name)
        if reg.access == "read":
            raise VTSWriteError(f"Rejestr '{name}' jest tylko do odczytu")

        assert self._client is not None, "Klient nie jest połączony — wywołaj connect()"

        try:
            if reg.table == "coil":
                result = self._client.write_coil(
                    reg.address, bool(value), slave=self.device_config.unit_id
                )
            elif reg.table == "holding":
                words = reg.encode(value)
                if len(words) == 1:
                    result = self._client.write_register(
                        reg.address, words[0], slave=self.device_config.unit_id
                    )
                else:
                    result = self._client.write_registers(
                        reg.address, words, slave=self.device_config.unit_id
                    )
            else:
                raise VTSWriteError(
                    f"Zapis do tabeli '{reg.table}' nie jest obsługiwany "
                    f"(rejestr '{name}')"
                )
        except ModbusException as exc:
            raise VTSWriteError(f"Błąd zapisu rejestru '{name}': {exc}") from exc

        if result.isError():
            raise VTSWriteError(f"Urządzenie zwróciło błąd przy zapisie '{name}': {result}")

    # -- odczyt wielu parametrów naraz -----------------------------------
    def read_all(self) -> Dict[str, Any]:
        """Odczytuje wszystkie rejestry z mapy, które mają dostęp read/read_write."""
        values: Dict[str, Any] = {}
        for name, reg in self.registers.items():
            if reg.access == "write":
                continue
            try:
                values[name] = self.read(name)
            except VTSReadError as exc:
                logger.warning("Pominięto rejestr '%s': %s", name, exc)
                values[name] = None
        return values

    # -- wewnętrzne -------------------------------------------------------
    def _get_register(self, name: str) -> RegisterDefinition:
        if name not in self.registers:
            raise VTSRegisterNotFoundError(f"Nieznany rejestr: '{name}'")
        return self.registers[name]

    def _read_raw(self, reg: RegisterDefinition):
        assert self._client is not None, "Klient nie jest połączony — wywołaj connect()"

        unit = self.device_config.unit_id
        if reg.table == "holding":
            return self._client.read_holding_registers(
                reg.address, count=reg.register_count, slave=unit
            )
        if reg.table == "input":
            return self._client.read_input_registers(
                reg.address, count=reg.register_count, slave=unit
            )
        if reg.table == "coil":
            return self._client.read_coils(reg.address, count=1, slave=unit)
        if reg.table == "discrete_input":
            return self._client.read_discrete_inputs(reg.address, count=1, slave=unit)

        raise VTSReadError(f"Nieobsługiwana tabela rejestrów: {reg.table}")
